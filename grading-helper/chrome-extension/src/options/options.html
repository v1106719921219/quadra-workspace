<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Grading Helper - 設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 24px;
    }
    h1 { font-size: 18px; margin-bottom: 20px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #2563eb; }
    .hint { font-size: 11px; color: #888; margin-top: -12px; margin-bottom: 16px; }
    button {
      padding: 8px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .saved {
      display: inline-block;
      margin-left: 12px;
      color: #16a34a;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Grading Helper 設定</h1>
  <label for="serverUrl">サーバーURL</label>
  <input id="serverUrl" placeholder="https://your-app.vercel.app" />
  <div class="hint">WebアプリのベースURL</div>

  <label for="apiKey">APIキー</label>
  <input id="apiKey" type="password" placeholder="gh_xxxxxxxx..." />
  <div class="hint">Webアプリの設定画面で発行したAPIキー</div>

  <button id="save-btn">保存</button>
  <span class="saved" id="saved" style="display:none;">保存しました</span>

  <script src="options/options.js"></script>
</body>
</html>
