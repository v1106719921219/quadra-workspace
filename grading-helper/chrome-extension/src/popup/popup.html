<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      padding: 12px 16px;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header button {
      background: none; border: none; color: #aaa; cursor: pointer;
      font-size: 12px; text-decoration: underline;
    }
    .header button:hover { color: #fff; }
    .content { padding: 12px 16px; }
    .error {
      background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
      padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 12px;
    }
    .loading { text-align: center; padding: 40px 0; color: #888; }
    .list { list-style: none; }
    .list li {
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .list li:hover { background: #f9fafb; }
    .list-title {
      font-weight: 500;
      display: flex; justify-content: space-between; align-items: center;
    }
    .list-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .badge {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 4px; font-weight: 500;
    }
    .badge-draft { background: #f3f4f6; color: #6b7280; }
    .badge-submitted { background: #dbeafe; color: #2563eb; }
    .badge-returned { background: #dcfce7; color: #16a34a; }

    .back-btn {
      background: none; border: none; cursor: pointer;
      color: #6b7280; font-size: 12px; margin-bottom: 8px; padding: 0;
    }
    .back-btn:hover { color: #1a1a1a; }

    .card-list { list-style: none; }
    .card-item {
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .card-name { font-weight: 500; }
    .card-grading { font-family: monospace; color: #4b5563; margin-top: 2px; }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .fetch-btn, .autofill-btn {
      flex: 1;
      padding: 10px;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .fetch-btn { background: #059669; }
    .fetch-btn:hover { background: #047857; }
    .fetch-btn:disabled { background: #6ee7b7; cursor: not-allowed; }
    .autofill-btn { background: #2563eb; }
    .autofill-btn:hover { background: #1d4ed8; }
    .autofill-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .empty { text-align: center; padding: 24px 0; color: #888; }

    .scrape-section {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .scrape-btn {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .scrape-btn:hover { background: #6d28d9; }
    .scrape-btn:disabled { background: #c4b5fd; cursor: not-allowed; }
    .scrape-hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      line-height: 1.4;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Grading Helper</h1>
    <button id="options-btn">設定</button>
  </div>
  <div class="content" id="content">
    <div class="loading" id="loading">読み込み中...</div>
  </div>
  <script src="popup/popup.js"></script>
</body>
</html>
