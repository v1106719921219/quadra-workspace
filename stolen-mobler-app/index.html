<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOLEN MØBLER — デジタル戦略ご提案</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Noto+Sans+JP:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a;
  --gold: #C4A265;
  --gold-light: #D4B87A;
  --beige: #F5F0EB;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--black);
  color: var(--beige);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 40%, rgba(196,162,101,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(196,162,101,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 20%, rgba(196,162,101,0.03) 0%, transparent 60%);
  animation: bgFloat 25s ease-in-out infinite alternate;
  z-index: 0;
}
@keyframes bgFloat {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-3%, 2%) rotate(1deg); }
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 40px;
  max-width: 700px;
}

/* Logo */
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 6vw, 48px);
  font-weight: 300;
  letter-spacing: 8px;
  margin-bottom: 8px;
  animation: fadeUp 1s 0.2s ease both;
}
.logo span { color: var(--gold); font-weight: 400; }

.subtitle {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(14px, 2.5vw, 18px);
  font-weight: 300;
  letter-spacing: 4px;
  color: rgba(245,240,235,0.6);
  margin-bottom: 12px;
  animation: fadeUp 1s 0.4s ease both;
}

.divider {
  width: 50px;
  height: 1px;
  background: var(--gold);
  margin: 32px auto;
  animation: fadeUp 1s 0.5s ease both;
}

.desc {
  font-size: 14px;
  font-weight: 200;
  color: rgba(245,240,235,0.5);
  line-height: 2;
  margin-bottom: 56px;
  letter-spacing: 0.5px;
  animation: fadeUp 1s 0.6s ease both;
}

/* Cards */
.cards {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeUp 1s 0.8s ease both;
}

.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 280px;
  padding: 48px 32px;
  border: 1px solid rgba(196,162,101,0.15);
  border-radius: 20px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(10px);
  text-decoration: none;
  color: var(--beige);
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(196,162,101,0.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.5s ease;
}
.card:hover {
  border-color: rgba(196,162,101,0.4);
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(196,162,101,0.08);
}
.card:hover::before { opacity: 1; }

.card-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(196,162,101,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  position: relative;
}
.card-icon svg {
  width: 24px;
  height: 24px;
  stroke: var(--gold);
  fill: none;
  stroke-width: 1.5;
}

.card-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
  position: relative;
}
.card-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 2px;
  margin-bottom: 12px;
  position: relative;
}
.card-desc {
  font-size: 12px;
  color: rgba(245,240,235,0.45);
  line-height: 1.8;
  position: relative;
}

.card-arrow {
  margin-top: 24px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(196,162,101,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  position: relative;
}
.card-arrow svg {
  width: 16px;
  height: 16px;
  stroke: var(--gold);
  fill: none;
  stroke-width: 1.5;
}
.card:hover .card-arrow {
  background: var(--gold);
  border-color: var(--gold);
}
.card:hover .card-arrow svg { stroke: var(--black); }

/* Footer */
.footer {
  position: relative;
  z-index: 1;
  margin-top: 56px;
  font-size: 11px;
  color: rgba(245,240,235,0.2);
  letter-spacing: 2px;
  animation: fadeUp 1s 1s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  .cards { flex-direction: column; align-items: center; }
  .card { width: 100%; max-width: 320px; }
  .container { padding: 40px 24px; }
}
</style>
</head>
<body>

<div class="container">
  <h1 class="logo">STOLEN <span>MØBLER</span></h1>
  <p class="subtitle">デジタル戦略ご提案</p>
  <div class="divider"></div>
  <p class="desc">
    山口県周南市の家具ギャラリー STOLEN MØBLER 様への<br>
    デジタル戦略 &amp; マーケティングご提案資料です。
  </p>

  <div class="cards">
    <a href="proposal-v3.html" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <p class="card-label">Proposal</p>
      <h2 class="card-title">提案書</h2>
      <p class="card-desc">市場分析・戦略設計・<br>マーケティング計画・ロードマップ</p>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </div>
    </a>

    <a href="demo/index.html" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </div>
      <p class="card-label">Demo</p>
      <h2 class="card-title">デモサイト</h2>
      <p class="card-desc">LINE+Web会員サイトの<br>デザイン・UI体験デモ</p>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </div>
    </a>
  </div>

  <p class="footer">2026年3月 — Confidential</p>
</div>

</body>
</html>
